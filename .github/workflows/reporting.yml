name: Test and Report Workflow

on:
  push:
    branches:
      - master
      - developement

  schedule:
    - cron: '0 10 * * *'
env:
  REPORT_HTML: Reports/pytests/report.html
  REPORT_JSON: Reports/json/report.json
  REPORT_EXCEL: Reports/excel/pytest-results.xlsx
  REPORT_JUNIT: Reports/junit/report.xml

jobs:
  test-suite:
    runs-on: ubuntu-latest
    env:
      HEADLESS: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create Python virtual environment
        run: python -m venv venv

      - name: Install Python dependencies
        run: |
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          source venv/bin/activate
          playwright install

      - name: Install Playwright system dependencies
        run: |
          source venv/bin/activate
          npx playwright install-deps

      - name: Run tests
        run: |
          source venv/bin/activate
          mkdir -p Reports/pytests Reports/json Reports/junit Reports/excel
          xvfb-run --auto-servernum --server-args='-screen 0 1920x1080x24' \
            python -m pytest --html=$REPORT_HTML --self-contained-html \
            --json-report --json-report-file=$REPORT_JSON --junitxml=$REPORT_JUNIT tests

      - name: Upload Reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: Reports

  report-generator:
    needs: test-suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download test reports artifact
        uses: actions/download-artifact@v4
        with:
          name: test-reports
          path: Reports

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create Python virtual environment
        run: python -m venv venv

      - name: Install Python dependencies
        run: |
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Excel report from JSON
        run: |
          source venv/bin/activate
          RUN_PYTEST=false python scripts/generate_reports.py

      - name: Prepare email metadata
        run: |
          echo "BRANCH=${{ github.ref_name }}" >> $GITHUB_ENV
          echo "RUN_TYPE=${{ github.event_name }}" >> $GITHUB_ENV

      - name: Send report email
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: |
            ${{ github.ref_name == 'master' && github.event_name == 'push' && format('Master Suite Report - run #{0}', github.run_number) || format('Scheduled Report: {0} - run #{1}', github.ref_name, github.run_number) }}
          body: |
            Hello Team,

            The pytest suite has completed on branch `${{ github.ref_name }}` with trigger `${{ github.event_name }}`.

            HTML and Excel reports are attached for your review.

            Regards,
            Automation Bot
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}
          content_type: text/plain
          attachments: |
            ${{ env.REPORT_HTML }}
            ${{ env.REPORT_EXCEL }}
