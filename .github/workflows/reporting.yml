name: Test and Report Workflow

on:
  push:
    branches:
      - master
      - developement

  schedule:
  - cron: '30 4 * * 1-5'

env:
  REPORT_HTML: Reports/pytests/report.html
  REPORT_JSON: Reports/json/report.json
  REPORT_EXCEL: Reports/excel/pytest-results.xlsx
  REPORT_JUNIT: Reports/junit/report.xml

jobs:
  test-suite:
    runs-on: ubuntu-latest
    env:
      HEADLESS: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create Python virtual environment
        run: python -m venv venv

      - name: Install Python dependencies
        run: |
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          source venv/bin/activate
          playwright install

      - name: Install Playwright system dependencies
        run: |
          source venv/bin/activate
          npx playwright install-deps

      - name: Run tests
        run: |
          source venv/bin/activate
          mkdir -p Reports/pytests Reports/json Reports/junit Reports/excel
          xvfb-run --auto-servernum --server-args='-screen 0 1920x1080x24' \
            python -m pytest --html=$REPORT_HTML --self-contained-html \
            --json-report --json-report-file=$REPORT_JSON --junitxml=$REPORT_JUNIT tests

      - name: Upload Reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: Reports

  report-generator:
    needs: test-suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download test reports artifact
        uses: actions/download-artifact@v4
        with:
          name: test-reports
          path: Reports

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create Python virtual environment
        run: python -m venv venv

      - name: Install Python dependencies
        run: |
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Excel report from JSON
        run: |
          source venv/bin/activate
          RUN_PYTEST=false python scripts/generate_reports.py

      # 🔥 Extract real test summary from JSON
      - name: Extract test summary
        run: |
          PASSED=$(jq '.summary.passed // 0' $REPORT_JSON)
          FAILED=$(jq '.summary.failed // 0' $REPORT_JSON)
          SKIPPED=$(jq '.summary.skipped // 0' $REPORT_JSON)
          TOTAL=$(jq '.summary.total // 0' $REPORT_JSON)

          echo "TESTS_PASSED=$PASSED" >> $GITHUB_ENV
          echo "TESTS_FAILED=$FAILED" >> $GITHUB_ENV
          echo "TESTS_SKIPPED=$SKIPPED" >> $GITHUB_ENV
          echo "TESTS_TOTAL=$TOTAL" >> $GITHUB_ENV

      - name: Prepare email metadata
        run: |
          echo "BRANCH=${{ github.ref_name }}" >> $GITHUB_ENV
          echo "RUN_TYPE=${{ github.event_name }}" >> $GITHUB_ENV

      # 🚀 Upgraded Email Step
      - name: Send report email
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}

          subject: >
            ${{ github.ref_name == 'master' && github.event_name == 'push'
              && format('Master Automation Report | Run #{0}', github.run_number)
              || format('Automation Report [{0}] | Run #{1}', github.ref_name, github.run_number) }}

          content_type: text/html

          body: |
            <html>
            <body style="font-family: Arial, sans-serif; color:#333;">

              <h2 style="color:#2E86C1;">Automation Test Report</h2>

              <p>Hello Team,</p>

              <p>The automated <b>pytest execution</b> has completed successfully.</p>

              <hr>

              <h3> ---:Execution Details:---</h3>
              <table style="border-collapse: collapse;">
                <tr><td><b>Repository:</b></td><td>${{ github.repository }}</td></tr>
                <tr><td><b>Branch:</b></td><td>${{ github.ref_name }}</td></tr>
                <tr><td><b>Trigger:</b></td><td>${{ github.event_name }}</td></tr>
                <tr><td><b>Run #:</b></td><td>${{ github.run_number }}</td></tr>
                <tr><td><b>Workflow:</b></td><td>${{ github.workflow }}</td></tr>
              </table>

              <br>

              <h3>Test Summary</h3>
              <p>
                ✅ Passed: <b>${{ env.TESTS_PASSED }}</b><br>
                ❌ Failed: <b>${{ env.TESTS_FAILED }}</b><br>
                ⏭ Skipped: <b>${{ env.TESTS_SKIPPED }}</b><br>
                📈 Total: <b>${{ env.TESTS_TOTAL }}</b>
              </p>

              <br>

              <h3>Reports</h3>
              <ul>
                <li>HTML Report (Attached)</li>
                <li>Excel Report (Attached)</li>
              </ul>

              <br>

              <h3>Workflow Link</h3>
              <p>
                <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">
                  View Full Run Details
                </a>
              </p>

              <br>
              <hr>

              <p>
                Please review the attached reports for detailed insights.<br>
                Investigate failures (if any) and take necessary action.
              </p>

              <p>
                Regards,<br>
                <b>Automation Bot</b>
              </p>

            </body>
            </html>

          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}

          attachments: |
            ${{ env.REPORT_HTML }}
            ${{ env.REPORT_EXCEL }}