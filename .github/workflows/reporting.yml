name: Test and Report Workflow

on:
  push:
    branches:
      - master
      - developement

  schedule:
    - cron: '30 4 * * 1-5'  # 10:00 AM IST (Mon–Fri)

env:
  REPORT_HTML: Reports/pytests/report.html
  REPORT_JSON: Reports/json/report.json
  REPORT_EXCEL: Reports/excel/pytest-results.xlsx
  REPORT_JUNIT: Reports/junit/report.xml

jobs:
  test-suite:
    runs-on: ubuntu-latest
    env:
      HEADLESS: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create virtual environment
        run: python -m venv venv

      - name: Install dependencies
        run: |
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright
        run: |
          source venv/bin/activate
          playwright install
          npx playwright install-deps

      - name: Run tests
        run: |
          source venv/bin/activate
          mkdir -p Reports/pytests Reports/json Reports/junit Reports/excel
          xvfb-run --auto-servernum --server-args='-screen 0 1920x1080x24' \
            python -m pytest \
            --html=$REPORT_HTML --self-contained-html \
            --json-report --json-report-file=$REPORT_JSON \
            --junitxml=$REPORT_JUNIT tests

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: Reports

  report-generator:
    needs: test-suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download reports
        uses: actions/download-artifact@v4
        with:
          name: test-reports
          path: Reports

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create virtual environment
        run: python -m venv venv

      - name: Install dependencies
        run: |
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Excel report
        run: |
          source venv/bin/activate
          RUN_PYTEST=false python scripts/generate_reports.py

      # ✅ Ensure jq exists
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # 🔥 Extract metrics + status + failed tests
      - name: Extract test insights
        run: |
          PASSED=$(jq '.summary.passed // 0' $REPORT_JSON)
          FAILED=$(jq '.summary.failed // 0' $REPORT_JSON)
          SKIPPED=$(jq '.summary.skipped // 0' $REPORT_JSON)
          TOTAL=$(jq '.summary.total // 0' $REPORT_JSON)

          echo "TESTS_PASSED=$PASSED" >> $GITHUB_ENV
          echo "TESTS_FAILED=$FAILED" >> $GITHUB_ENV
          echo "TESTS_SKIPPED=$SKIPPED" >> $GITHUB_ENV
          echo "TESTS_TOTAL=$TOTAL" >> $GITHUB_ENV

          if [ "$FAILED" -gt 0 ]; then
            echo "STATUS=FAIL" >> $GITHUB_ENV
            echo "STATUS_COLOR=#E74C3C" >> $GITHUB_ENV
          else
            echo "STATUS=PASS" >> $GITHUB_ENV
            echo "STATUS_COLOR=#2ECC71" >> $GITHUB_ENV
          fi

          FAILED_TESTS=$(jq -r '.tests[] | select(.outcome=="failed") | .nodeid' $REPORT_JSON | head -n 5)

          echo "FAILED_TESTS<<EOF" >> $GITHUB_ENV
          echo "$FAILED_TESTS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # 📧 Send Email
      - name: Send report email
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}

          subject: >
            ${{ env.STATUS == 'FAIL'
              && format('🔴 Test Failures | Run #{0}', github.run_number)
              || format('🟢 All Tests Passed | Run #{0}', github.run_number) }}

          # Fallback (important)
          body: "Your email client does not support HTML. Please check attachments."

          body_html: |
            <div style="font-family: Arial; max-width: 800px; margin:auto;">

              <div style="background:${{ env.STATUS_COLOR }}; color:white; padding:15px; text-align:center; font-size:20px;">
                ${{ env.STATUS }} - Test Execution Summary
              </div>

              <br>

              <p>Hello Team,</p>

              <p>Automation test execution completed.</p>

              <table style="width:100%; text-align:center;">
                <tr>
                  <td style="background:#2ECC71; color:white;">Passed<br><b>${{ env.TESTS_PASSED }}</b></td>
                  <td style="background:#E74C3C; color:white;">Failed<br><b>${{ env.TESTS_FAILED }}</b></td>
                  <td style="background:#F1C40F;">Skipped<br><b>${{ env.TESTS_SKIPPED }}</b></td>
                  <td style="background:#3498DB; color:white;">Total<br><b>${{ env.TESTS_TOTAL }}</b></td>
                </tr>
              </table>

              <br>

              <h3>Execution Details</h3>
              <p>
                Repo: ${{ github.repository }}<br>
                Branch: ${{ github.ref_name }}<br>
                Run: #${{ github.run_number }}
              </p>

              <h3>Top Failed Tests</h3>
              <pre>${{ env.FAILED_TESTS }}</pre>

              <p>
                <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">
                  View Full Report
                </a>
              </p>

              <br>

              <p>Reports are attached.</p>

              <p>Regards,<br><b>Automation Bot</b></p>

            </div>

          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}

          attachments: |
            ${{ env.REPORT_HTML }}
            ${{ env.REPORT_EXCEL }}